
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Blackjack iOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700;800&display=swap');
      
      body {
        font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: #000;
        color: #fff;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
      }

      .felt-bg {
        background: radial-gradient(circle at center, #1a472a 0%, #0d2b18 100%);
      }

      .ios-glass {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Animations */
      @keyframes dealCard {
        0% { transform: translateY(-200px) rotate(15deg); opacity: 0; }
        100% { transform: translateY(0) rotate(0deg); opacity: 1; }
      }
      @keyframes flyToPot {
        0% { transform: scale(1) translate(0, 0); opacity: 1; }
        100% { transform: scale(0.8) translate(var(--tw-translate-x), var(--tw-translate-y)); opacity: 1; }
      }
      @keyframes pop {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
      }
      @keyframes chipLand {
        0% { transform: scale(0.5) translate(var(--land-x), var(--land-y)) rotate(var(--land-rot)); }
        60% { transform: scale(1.1) translate(var(--land-x), var(--land-y)) rotate(var(--land-rot)); }
        100% { transform: scale(1) translate(var(--land-x), var(--land-y)) rotate(var(--land-rot)); }
      }
      @keyframes chipWinBounce {
        0%, 100% { transform: translate(var(--land-x), var(--land-y)) rotate(var(--land-rot)) scale(1); }
        50% { transform: translate(var(--land-x), var(--land-y)) rotate(var(--land-rot)) scale(1.2) translateY(-10px); }
      }
      @keyframes glowPulse {
        0%, 100% { opacity: 0.1; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(1.1); }
      }
      @keyframes selectionPulse {
        0% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.2); filter: brightness(1.4) drop-shadow(0 0 15px rgba(255,255,255,0.6)); }
        100% { transform: scale(1); filter: brightness(1); }
      }
      @keyframes handWinPulse {
        0%, 100% { box-shadow: 0 0 15px rgba(74, 222, 128, 0.2); }
        50% { box-shadow: 0 0 35px rgba(74, 222, 128, 0.6); }
      }

      .animate-deal {
        animation: dealCard 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
      }
      .animate-fly {
        animation: flyToPot 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      .animate-pop {
        animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }
      .animate-land {
        animation: chipLand 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }
      .animate-win-bounce {
        animation: chipWinBounce 0.6s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      }
      .win-glow {
        animation: glowPulse 2s ease-in-out infinite;
      }
      .chip-active-pulse {
        animation: selectionPulse 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      }
      .hand-win-glow {
        animation: handWinPulse 2s ease-in-out infinite;
      }

      /* PROFESSIONAL CASINO CHIP DESIGN - REFINED */
      .chip-base {
        position: relative;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 
          0 15px 30px -10px rgba(0, 0, 0, 0.9),
          0 5px 15px -5px rgba(0, 0, 0, 0.7),
          inset 0 2px 3px rgba(255, 255, 255, 0.4),
          inset 0 -3px 6px rgba(0, 0, 0, 0.5);
        border: none;
        overflow: hidden;
        background-color: var(--chip-color);
        aspect-ratio: 1/1;
        background-image: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%, rgba(0,0,0,0.2) 100%);
      }

      /* Clay edge spots with more depth */
      .chip-edge-spots {
        position: absolute;
        inset: 0;
        background: repeating-conic-gradient(
          from 0deg,
          transparent 0deg 30deg,
          #ffffff 30deg 40deg,
          transparent 40deg 70deg
        );
        mask-image: radial-gradient(circle, transparent 72%, black 73%);
        -webkit-mask-image: radial-gradient(circle, transparent 72%, black 73%);
        z-index: 1;
        opacity: 0.95;
      }

      .chip-inlay {
        position: absolute;
        inset: 20%;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #ffffff 0%, #d1d5db 100%);
        box-shadow: 
          inset 0 5px 10px rgba(0, 0, 0, 0.4),
          0 2px 5px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(0,0,0,0.1);
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 4px;
      }

      /* Metallic ring with sheen */
      .chip-inner-ring {
        position: absolute;
        inset: 12%;
        border-radius: 50%;
        border: 2px solid;
        border-color: rgba(255, 215, 0, 0.6);
        background: transparent;
        z-index: 2;
        box-shadow: 0 0 5px rgba(0,0,0,0.3);
      }

      /* Overlay for metallic sheen across the whole chip */
      .chip-sheen {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg, 
          transparent 0%, 
          transparent 40%, 
          rgba(255, 255, 255, 0.4) 48%, 
          rgba(255, 255, 255, 0.7) 50%, 
          rgba(255, 255, 255, 0.4) 52%, 
          transparent 60%, 
          transparent 100%
        );
        z-index: 5;
        pointer-events: none;
        opacity: 0.5;
      }

      .chip-base::after {
        content: '';
        position: absolute;
        inset: 0;
        opacity: 0.15;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 4;
      }

      .chip-10 { --chip-color: #1d4ed8; }
      .chip-50 { --chip-color: #047857; }
      .chip-100 { --chip-color: #111827; }

      .pot-zone {
        background: radial-gradient(circle at center, rgba(0,0,0,0.4) 0%, transparent 75%);
        border: 2px dashed rgba(255,255,255,0.08);
      }

      .card-animation {
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2);
      }
    </style>
<script type="importmap">

</script>
</head>

</html>
